<div class="card p-4">
  <h3>Vérification</h3>

  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="email" class="form-control" />
  </div>

  <div class="form-group">
    <label>Code OTP</label>
    <input type="text" [(ngModel)]="otp" class="form-control" />
  </div>

  <button class="btn btn-primary mt-3" (click)="verify()">
    Vérifier
  </button>
</div>
